name: Java CI with Maven

on:
  push:
    branches: [ "main", "master", "*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # All tests for feature branch pushes
  feature-branch-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run All Tests
        run: mvn test -Dgroups="smoke | unit | integration | provider | e2e" -Dmaven.wagon.http.retryHandler.class=standard -Dmaven.wagon.http.retryHandler.count=3

  # Integration tests for Pull Requests
  pull-request-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Smoke, Unit and Integration tests
        run: mvn test -Dgroups="smoke | unit | integration" -Dmaven.wagon.http.retryHandler.class=standard -Dmaven.wagon.http.retryHandler.count=3

  # Full validation for pushes to main/master
  main-branch-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run All Tests
        run: mvn test -Dgroups="smoke | unit | integration | provider | e2e" -Dmaven.wagon.http.retryHandler.class=standard -Dmaven.wagon.http.retryHandler.count=3