<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Sign in</h1>
        <div th:if="${param.error}" class="error">Invalid username or password.</div>
        <div th:if="${param.logout}" class="success">You have been signed out.</div>
        <div th:if="${param.registered}" class="success">Account created. Please sign in.</div>
        <form method="post" th:action="@{/login}">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autofocus required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Sign in</button>
        </form>
        <p class="muted" style="margin-top:1rem;">
            New here? <a href="/register">Create an account</a>.
        </p>
    </div>
</div>
</body>
</html>
